<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Validasi Faktur Pajak</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
/* =====================================================
   COLOR SYSTEM (LIGHT / DARK VIA CSS VARIABLES)
   ===================================================== */

:root{
  --bg:#eef7ff;
  --card:rgba(255,255,255,.85);
  --glass:rgba(255,255,255,.75);
  --text:#111827;
  --border:#e5e7eb;
  --header-grad:linear-gradient(135deg,#0ea5e9,#1d4ed8);
  --btn:#2563eb;
}

/* 🔥 DARK MODE COLORS */
body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --glass:#1e293bee;
  --text:#e2e8f0;
  --border:#334155;
  --header-grad:linear-gradient(135deg,#0369a1,#1e40af);
  --btn:#3b82f6;
}

/* ===================================================== */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* ===== HEADER ===== */
.header-wrap{
  padding:20px;
  display:flex;
  justify-content:center;
}

/* ===== HEADER CAPSULE ===== */

.header{
  position:relative;
  width:100%;
  background:var(--header-grad);
  padding:24px 70px;
  border-radius:999px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  color:white;
  box-shadow:0 14px 40px rgba(0,0,0,.25);
  overflow: hidden;
}

/* title tetap center */
.header-title{
  pointer-events:none;
}

/* ===== THEME BUTTON  ===== */

.theme-btn{
  position:absolute;
  right:30px;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.25s;
  backdrop-filter:blur(10px);

  z-index:5;
}

.theme-btn:hover{
  background:rgba(255,255,255,.35);
  transform:translateY(-50%) scale(1.08);
}

/* ===== ICON FADE ===== */

.icon{
  width:20px;
  height:20px;
  position:absolute;
  transition:.25s;
  opacity:0;
  transform:scale(.7);
}

.icon.active{
  opacity:1;
  transform:scale(1);
}

#themeIcon{
  transition: opacity .25s, transform .25s;
}
#themeIcon.fade{
  opacity:0;
  transform:scale(.7);
}

/* ===== CARD ===== */
.container{padding:30px}
.card{
  background:var(--glass);
  backdrop-filter:blur(14px);
  border-radius:16px;
  padding:20px;
  margin-bottom:15px;
}

/* ===== DROP ===== */
.drop{
  border:2px dashed #94a3b8;
  padding:20px;
  border-radius:12px;
  text-align:center;
  margin-bottom:8px;
}

.drop.drag{
  background:#e0f2fe;
  border-color:#2563eb;
}

/* ===== BUTTON ===== */
button{
  background:var(--btn);
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:999px;
  cursor:pointer;
  margin-bottom:15px;
}

/* ===== TABLE ===== */
.table-wrap{
  max-height:60vh;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  border-radius:14px;
  overflow:hidden;
  background:var(--card);
  color:var(--text);
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  transition:.3s;
}

thead th{
  position:sticky;
  top:0;
  background:var(--header-grad);
  color:white;
  z-index:2;
}

td,th{
  padding:8px;
  border-bottom:1px solid var(--border);
  font-size:13px;
}

.small{
  width:35px;
  text-align:center;
}

/* ============================= */
/* ROW COLOR SYSTEM (KONTRAS)   */
/* ============================= */

.ok{background:#3c835d;}
.warn{background:#ffdf85;}
.no{background:#ff7979;}
.missing{background:#3b3a31;}

body.dark .ok{background:#134e2a;}
body.dark .warn{background:#5b3d0a;}
body.dark .no{background:#5b1616;}
body.dark .missing{background:#2c2410;}

tbody tr:hover{
  background:#93c5fd33 !important;
}


/* ===================== */
/* STATUS BADGE (PILL)   */
/* ===================== */

.badge{
  padding:4px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  color:white;
}

.badge-ok{background:#16a34a}
.badge-warn{background:#f59e0b}
.badge-no{background:#dc2626}
.badge-missing{background:#92400e}



/* ===== PROGRESS ===== */
.progress{
  height:8px;
  background:#e5e7eb;
  border-radius:6px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:var(--btn);
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  display:flex;
  align-items:center;
  justify-content:center;
  visibility:hidden;
}
.modal.show{
  visibility:visible;
}
.modal-box{
  background:var(--card);
  color:var(--text);
  padding:20px 30px;
  border-radius:12px;
}

/* ===== DROP HOVER ===== */
.drop{
  transition:.2s;
}
.drop.drag{
  background:#e0f2fe;
  border-color:#2563eb;
}

/* ===== MODERN SWITCH ===== */
.switch{
  position:relative;
  display:inline-block;
  width:46px;
  height:24px;
}
.switch input{display:none}

.slider{
  position:absolute;
  inset:0;
  background:#cbd5e1;
  border-radius:999px;
  transition:.2s;
}
.slider:before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  left:3px;
  top:3px;
  background:white;
  border-radius:50%;
  transition:.2s;
}
.switch input:checked + .slider{
  background:#2563eb;
}
.switch input:checked + .slider:before{
  transform:translateX(22px);
}

/* ===== CONTROL WRAP ===== */
.controls{
  display:flex;
  align-items:center;
  gap:20px;
  margin-top:20px;
}

.tol-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}

.badge.blue{
  background:var(--btn);
}

</style>
</head>

<body>

<div class="header-wrap">
  <div class="header">
    <div class="header-title">Validasi Faktur Pajak</div>

    <button class="theme-btn" id="themeToggle">

      <!-- MOON -->
      <svg id="iconMoon" class="icon active" viewBox="0 0 24 24">
        <path fill="currentColor"
          d="M21 12.79A9 9 0 0111.21 3 7 7 0 1019 20.79 9 9 0 0121 12.79z"/>
      </svg>

      <!-- SUN -->
      <svg id="iconSun" class="icon" viewBox="0 0 24 24">
        <path fill="currentColor"
          d="M12 4V1m0 22v-3m8-8h3M1 12h3
            m15.36 6.36l2.12 2.12M4.52 4.52l2.12 2.12
            m0 10.72l-2.12 2.12m15.36-15.36l-2.12 2.12
            M12 7a5 5 0 100 10 5 5 0 000-10z"/>
      </svg>

    </button>
  </div>
</div>

<div class="container">

<div class="card">
  <div id="dropSheet" class="drop">📄 Drop Excel (.xlsx)</div>
  <div id="dropPDF" class="drop">📑 Drop Banyak PDF</div>

  <div class="controls">

    <label class="switch">
      <input type="checkbox" id="filterMismatch">
      <span class="slider"></span>
    </label>
    <span>Tampilkan mismatch saja</span>

    <div class="tol-wrap">
      Toleransi:
      <input id="tol" type="range" min="0" max="50" value="5">
      <span class="badge" id="tolVal">5</span>
    </div>

  </div>

  <br><br>

  <button onclick="proses()">CEK</button>
  <button onclick="exportExcel()">Export Excel</button>

  <div class="progress"><div id="bar" class="bar"></div></div>
</div>

<div class="card table-wrap">
  <div id="hasil"></div>
</div>

</div>

<div id="modal" class="modal">
  <div id="modalText" class="modal-box"></div>
</div>

<script>
let sheetData={}, pdfFiles=[], hasil=[], foundRef=new Set();

/* ===== util ===== */
function rupiah(v){
  if(v === null || v === undefined || v === "") return 0;

  // kalau number dari Excel
  if(typeof v === "number"){
    return Math.round(v);
  }

  // kalau string Indonesia
  let s = String(v).trim();

  s = s.replace(/\s/g,'');   // spasi
  s = s.replace(/\./g,'');  // ribuan
  s = s.replace(',', '.');  // desimal

  return Math.round(parseFloat(s)) || 0;
}

function formatIDR(num){
  if(!num) return "-";
  return num.toLocaleString("id-ID");
}

function show(msg){
  modalText.innerText=msg;
  modal.classList.add("show");
  setTimeout(()=>modal.classList.remove("show"),1200);
}

function drop(id,cb){
  const el=document.getElementById(id);

  el.ondragover=e=>{
    e.preventDefault();
    el.classList.add("drag");
  };

  el.ondragleave=()=>el.classList.remove("drag");

  el.ondrop=e=>{
    e.preventDefault();
    el.classList.remove("drag");
    cb([...e.dataTransfer.files]);
  };
}

/* ===== excel ===== */
drop("dropSheet",files=>{
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"binary"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});

    sheetData={};
    for(let i=0;i<rows.length;i++){
      const ref=String(rows[i][9]||"").trim();
      if(ref){
        const total=rupiah(rows[i+1]?.[6]);
        if(total) sheetData[ref]=total;
      }
    }
    show(Object.keys(sheetData).length+" nota ditemukan di sheet");
  };
  r.readAsBinaryString(files[0]);
});

/* ===== pdf ===== */
drop("dropPDF",f=>{
  pdfFiles=f;
  show(pdfFiles.length+" faktur pajak dimuat");
});

/* ===== read pdf ===== */
async function readPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument(buf).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const p=await pdf.getPage(i);
    const c=await p.getTextContent();
    text+=c.items.map(x=>x.str).join(" ");
  }

  const ref=text.match(/\(Referensi:\s*([A-Z0-9]+)\)/)?.[1]||"";
  const jual = rupiah(
    text.match(/Harga Jual \/ Penggantian \/ Uang Muka \/ Termin\s+([\d\.,]+)/)?.[1]
  );
  const ppn = rupiah(
    text.match(/Jumlah PPN.*?\s+([\d\.,]+)/)?.[1]
  );

  return {
    nomor: ref,
    total: jual + ppn
  };
}

/* ===== process ===== */
async function proses(){

  hasil=[];
  const foundRef = new Set();

  const totalFiles=pdfFiles.length;
  let done=0;

  let rows=[];

  for(const f of pdfFiles){

    const p=await readPDF(f);
    const s=sheetData[p.nomor];

    let cls="no", status="TIDAK SESUAI", tick="✔";

    if(!s){
      cls="missing";
      status="NOTA TIDAK ADA DI SHEET";
    }else{
      foundRef.add(p.nomor);
      const diff=Math.abs(p.total-s);

      if(diff===0){cls="ok";status="SESUAI";}
      else if(diff<=5){cls="warn";status="SELISIH KECIL";}
    }

    rows.push({
      file:f.name,
      tick,
      ref:p.nomor,
      pdf:p.total,
      sheet:s||"",
      diff:Math.abs((p.total||0)-(s||0)),
      status,
      cls
    });

    done++;
    bar.style.width=(done/totalFiles*100)+"%";
  }

  /* ===== missing ===== */
  for(const ref in sheetData){
    if(!foundRef.has(ref)){
      rows.push({
        file:"-",
        tick:"✖",
        ref,
        pdf:"",
        sheet:sheetData[ref],
        diff:"",
        status:"BELUM ADA FP",
        cls:"missing"
      });
    }
  }

  /* ===== filter ===== */
  const filter=filterMismatch.checked;
  if(filter){
    rows=rows.filter(r=>r.cls!=="ok");
  }

  hasil=rows.map(r=>[r.file,r.ref,r.pdf,r.sheet,r.diff,r.status]);

  render(rows);

  show("Berhasil membaca "+rows.length+" nota");
  filterMismatch.addEventListener("change", proses);
}

/* ===== render ===== */
function render(rows){
  let html=`<table>
  <thead>
  <tr>
    <th>File</th>
    <th class="small">✔</th>
    <th>No Faktur</th>
    <th>PDF</th>
    <th>Sheet</th>
    <th>Selisih</th>
    <th>Status</th>
  </tr>
  </thead><tbody>`;

  rows.forEach(r=>{
    let badgeClass="";

    if(r.cls==="ok") badgeClass="badge-ok";
    else if(r.cls==="warn") badgeClass="badge-warn";
    else if(r.cls==="no") badgeClass="badge-no";
    else if(r.cls==="missing") badgeClass="badge-missing";

    html+=`
    <tr class="${r.cls}">
      <td>${r.file}</td>
      <td class="small">${r.tick}</td>
      <td>${r.ref}</td>
      <td>${formatIDR(r.pdf)}</td>
      <td>${formatIDR(r.sheet)}</td>
      <td>${formatIDR(r.diff)}</td>
      <td><span class="badge ${badgeClass}">${r.status}</span></td>
    </tr>
    `;
  });


  html+="</tbody></table>";
  hasilDiv.innerHTML=html;
}

/* ===== export ===== */
function exportExcel(){
  const ws=XLSX.utils.aoa_to_sheet([
    ["File","Referensi","PDF","Sheet","Selisih","Status"],
    ...hasil
  ]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Hasil");
  XLSX.writeFile(wb,"hasil_validasi.xlsx");
}

const hasilDiv=document.getElementById("hasil");
tol.oninput=()=>tolVal.innerText=tol.value;

/* =========================
   DARK MODE (FIXED)
   ========================= */

const themeBtn = document.getElementById("themeToggle");
const moon = document.getElementById("iconMoon");
const sun  = document.getElementById("iconSun");

function setTheme(isDark){

  document.body.classList.toggle("dark", isDark);

  moon.classList.toggle("active", !isDark);
  sun.classList.toggle("active", isDark);

  localStorage.setItem("dark", isDark);
}

themeBtn.onclick = ()=>{
  setTheme(!document.body.classList.contains("dark"));
};

setTheme(localStorage.getItem("dark")==="true");
</script>

</body>
</html>
