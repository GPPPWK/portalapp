<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Aplikasi Pajak & Gudang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .sidebar-transition { transition: all 0.3s ease-in-out; }
        
        /* Iframe styling */
        #appFrame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden bg-slate-900">

    <!-- Mobile Header & Hamburger -->
    <div class="lg:hidden absolute top-0 left-0 w-full bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-2 font-bold text-white">
            <div class="p-1.5 bg-blue-600 rounded-lg"><i data-lucide="layout-dashboard" class="w-5 h-5"></i></div>
            Portal WebApp
        </div>
        <button onclick="toggleSidebar()" class="text-slate-300 hover:text-white p-2">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-full absolute lg:relative z-40 transform -translate-x-full lg:translate-x-0 sidebar-transition pt-16 lg:pt-0">
        <!-- Logo Section -->
        <div class="p-6 hidden lg:flex items-center gap-3 border-b border-slate-800">
            <div class="p-2 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-xl shadow-lg shadow-blue-500/20 text-white">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Portal App</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-wide uppercase">Workspace Pajak</p>
            </div>
        </div>

        <!-- Menu Navigation -->
        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            <p class="px-6 text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Aplikasi Tersedia</p>
            
            <button onclick="loadApp('TaxFormatter', 'pembuat_catatan.html', 'calculator', this)" class="menu-item bg-blue-600/15 text-blue-400 border-blue-500 border-r-4 w-full flex items-center gap-3 px-6 py-3 text-sm font-medium hover:bg-slate-800 hover:text-white transition text-left">
                <i data-lucide="calculator" class="w-5 h-5"></i> TaxFormatter (Nota)
            </button>
            
            <button onclick="loadApp('Rekonsiliasi Faktur', 'rekonsiliasi.html', 'file-diff', this)" class="menu-item text-slate-300 border-transparent border-r-4 w-full flex items-center gap-3 px-6 py-3 text-sm font-medium hover:bg-slate-800 hover:text-white transition text-left">
                <i data-lucide="file-diff" class="w-5 h-5"></i> Rekonsiliasi Faktur
            </button>
            
            <button onclick="loadApp('Cek Faktur Pajak', 'cek_faktur.html', 'shield-check', this)" class="menu-item text-slate-300 border-transparent border-r-4 w-full flex items-center gap-3 px-6 py-3 text-sm font-medium hover:bg-slate-800 hover:text-white transition text-left">
                <i data-lucide="shield-check" class="w-5 h-5"></i> Cek Faktur (Validasi)
            </button>

            <button onclick="loadApp('Ekstrak FP PDF', 'rekap_fp_pdf.html', 'file-text', this)" class="menu-item text-slate-300 border-transparent border-r-4 w-full flex items-center gap-3 px-6 py-3 text-sm font-medium hover:bg-slate-800 hover:text-white transition text-left">
                <i data-lucide="file-text" class="w-5 h-5"></i> Ekstrak FP (PDF)
            </button>

            <button onclick="loadApp('Sortir Arsip Nota', 'arsip_nota.html', 'folder-open', this)" class="menu-item text-slate-300 border-transparent border-r-4 w-full flex items-center gap-3 px-6 py-3 text-sm font-medium hover:bg-slate-800 hover:text-white transition text-left">
                <i data-lucide="folder-open" class="w-5 h-5"></i> Sortir Arsip Nota
            </button>
        </nav>

        <div class="p-4 border-t border-slate-800 text-center">
            <p class="text-[10px] text-slate-500">Sistem terintegrasi secara lokal.</p>
        </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full bg-slate-950 pt-16 lg:pt-0 p-2 lg:p-4">
        <!-- Top Bar for Main Area -->
        <header class="hidden lg:flex justify-between items-center mb-4 px-2">
            <h2 id="currentAppName" class="text-lg font-bold text-slate-200 flex items-center gap-2">
                <i data-lucide="calculator" class="w-5 h-5 text-blue-500"></i> TaxFormatter (Nota)
            </h2>
            <div class="flex gap-2">
                <button onclick="refreshApp()" class="p-2 rounded-lg bg-slate-800 text-slate-300 hover:text-white hover:bg-slate-700 transition" title="Refresh Aplikasi">
                    <i data-lucide="rotate-cw" class="w-4 h-4"></i>
                </button>
                <button onclick="openNewTab()" class="p-2 rounded-lg bg-slate-800 text-slate-300 hover:text-white hover:bg-slate-700 transition" title="Buka di Tab Baru">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <!-- Container Iframe -->
        <div class="flex-1 bg-slate-900 rounded-xl border border-slate-800 overflow-hidden shadow-2xl relative">
            <div id="iframeLoader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 z-10">
                <i data-lucide="loader-2" class="w-8 h-8 text-blue-500 animate-spin mb-2"></i>
                <span class="text-xs text-slate-400 font-medium">Memuat Aplikasi...</span>
            </div>
            <iframe id="appFrame" src="pembuat_catatan.html" onload="hideLoader()"></iframe>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const iframe = document.getElementById('appFrame');
        const loader = document.getElementById('iframeLoader');
        const appTitle = document.getElementById('currentAppName');

        let currentSrc = 'pembuat_catatan.html';

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // BUGFIX: Menambahkan parameter iconName agar ikon tidak bentrok
        function loadApp(appName, fileName, iconName, element) {
            // Aktifkan loading screen
            loader.style.display = 'flex';
            
            // Ubah iframe source
            currentSrc = fileName;
            iframe.src = fileName;

            // Update judul bagian atas (Header Desktop)
            appTitle.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5 text-blue-500"></i> ${appName}`;
            lucide.createIcons();

            // Ubah pewarnaan menu active menggunakan Tailwind classes
            document.querySelectorAll('.menu-item').forEach(el => {
                el.classList.remove('bg-blue-600/15', 'text-blue-400', 'border-blue-500');
                el.classList.add('text-slate-300', 'border-transparent');
            });

            // Aktifkan warna menu yang sedang di-klik
            element.classList.remove('text-slate-300', 'border-transparent');
            element.classList.add('bg-blue-600/15', 'text-blue-400', 'border-blue-500');

            // Tutup sidebar di mobile setelah klik menu
            if (window.innerWidth < 1024) {
                toggleSidebar();
            }
        }

        function hideLoader() {
            loader.style.display = 'none';
        }

        function refreshApp() {
            loader.style.display = 'flex';
            iframe.src = iframe.src;
        }

        function openNewTab() {
            window.open(currentSrc, '_blank');
        }
    </script>
</body>
</html>
